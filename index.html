<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Grade Tracker</h1>
        
        <div class="input-section">
            <input type="text" id="studentName" placeholder="Student Name">
            <input type="number" id="studentGrade" placeholder="Grade (0-100)" min="0" max="100">
            <button onclick="addStudent()">Add Student</button>
        </div>
        
        <div class="summary-section">
            <h2>Summary Report</h2>
            <p>Total Students: <span id="totalStudents">0</span></p>
            <p>Class Average: <span id="averageGrade">0.00</span></p>
            <p>Highest Score: <span id="highestGrade">-</span></p>
            <p>Lowest Score: <span id="lowestGrade">-</span></p>
        </div>

        <div class="list-section">
            <h2>Student List</h2>
            <ul id="studentList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
